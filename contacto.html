<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos | Andrea Fragrances</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Georgia", "Times New Roman", serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #6f453f 0%, #8f5e50 45%, #e18a53 100%);
            color: #ffffff;
        }

        .contacto-hero {
            min-height: 34vh;
            display: flex;
            align-items: flex-end;
            padding: 2.25rem 2rem;
            background-image:
                linear-gradient(180deg, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.55) 100%),
                url("media/contactanos-fondo.png");
            background-size: cover;
            background-position: center;
        }

        .contacto-hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.1rem);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-wrapper {
            width: min(92%, 820px);
            margin: -1.25rem auto 2.5rem;
            padding: 1.25rem;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .form-wrapper iframe {
            width: 100%;
            max-width: 100%;
            min-height: 520px;
            border: 0;
            border-radius: 10px;
            background: #ffffff;
        }

        @media (max-width: 768px) {
            .contacto-hero {
                min-height: 28vh;
                padding: 1.8rem 1.2rem;
            }

            .form-wrapper {
                width: 95%;
                margin-top: -0.8rem;
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header class="contacto-hero">
        <h1>Contactanos</h1>
    </header>

    <main class="form-wrapper">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfCwHtXm9jZ4bhq_AqjOs1BJ5Iz5ipE7alSMv6vGMUVduVCyQ/viewform?embedded=true" width="700" height="520" frameborder="0" marginheight="0" marginwidth="0">Cargando…</iframe>
    </main>
</body>
</html>
